<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="quiz_app.css">
</head>
<body>
    <div id="container1">
            <h1>Quiz App</h1>
            <p>What is the capital of France?</p>
            <div id="form_section">
                <form>
                    <input type="radio" name="madrid" id="madrid">
                    <label for="madrid">Madrid</label> <br>
                    <input type="radio" name="berlin" id="berlin">
                    <label for="berlin">Berlin</label> <br>
                    <input type="radio" name="paris" id="paris">
                    <label for="paris">Paris</label> <br>
                    <input type="radio" name="london" id="london">
                    <label for="london">London</label> <br> <br>
                    <button type="submit">Submit</button>
                </form>
            </div>
    </div>
    
</body>
</html>
