<html> 
    <head>
        <link rel="stylesheet" href="quizapp-nasha.css">
    </head>
    <style>
        
    </style>
    <body>
        <div class="container1">
            <div class="quiz-container">
                <h1>
                    Quiz App
                </h1>
        
                <div class="question">
                    What is the capital of France?
                </div>
        
                <form id="quizForm">
                    <div class="options">
                        <label class="option"><input type="radio" name="capital" value="madrid">Madrid</label>
                        <label class="option"><input type="radio" name="capital" value="berlin">Berlin</label>
                        <label class="option"><input type="radio" name="capital" value="paris">Paris</label>
                        <label class="option"><input type="radio" name="capital" value="london">London</label>
                    </div>
            
                    <button style type="button" onclick="checkAnswer()">Submit</button>
                </form>
                <div id="result" class="result"></div>     
            </div>  
        </div>
    </body>
</html
